version: "3.9"

services:
  ollama-proxy:
    image: alpine/socat
    container_name: studify-ollama-proxy
    network_mode: host
    restart: unless-stopped
    command: "TCP-LISTEN:${OLLAMA_PROXY_PORT:-11435},fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:${OLLAMA_HOST_PORT:-11434}"

  postgres:
    image: postgres:16-alpine
    container_name: studify-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studify123}
      POSTGRES_DB: ${POSTGRES_DB:-studify}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studify} -d ${POSTGRES_DB:-studify}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: studify-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.1
    container_name: studify-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: studify-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://studify:studify123@postgres:5432/studify}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11435}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATA_DIR: ${DATA_DIR:-/app/data}
    command: >
      sh -c "python -m app.scripts.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      ollama-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data

  worker:
    build:
      context: ./backend
    container_name: studify-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://studify:studify123@postgres:5432/studify}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11435}
      DATA_DIR: ${DATA_DIR:-/app/data}
    command: ["python", "-m", "app.worker.main"]
    depends_on:
      ollama-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: studify-frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
